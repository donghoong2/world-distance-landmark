<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 탐험 학습</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; line-height: 1.6; }
    h1 { font-size: 1.6rem; }
    a.card { display: block; padding: 20px; margin: 16px 0; border: 1px solid #ddd; border-radius: 12px; text-decoration: none; color: #111; transition: .15s; }
    a.card:hover { border-color: #4a7; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .step { color: #4a7; font-weight: 700; font-size: .85rem; }
    .title { font-size: 1.15rem; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🌍 세계 탐험 학습</h1>
  <a class="card" href="step1.html">
    <div class="step">STEP 1</div>
    <div class="title">서울과 세계 여러 나라 사이의 거리 알아보기</div>
  </a>
  <a class="card" href="step2.html">
    <div class="step">STEP 2</div>
    <div class="title">세계 랜드마크와 맛집 탐험하기</div>
  </a>
</body>
</html>
